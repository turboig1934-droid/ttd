name: Paper World Defaults

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Get Paper Build
        id: paper
        run: |
          BUILD=$(curl -s https://api.papermc.io/v2/projects/paper/versions/1.21 | jq -r '.builds[-1]')
          echo "build=$BUILD" >> $GITHUB_OUTPUT

      - name: Download Paper
        run: |
          BUILD=${{ steps.paper.outputs.build }}
          wget -q https://api.papermc.io/v2/projects/paper/versions/1.21/builds/$BUILD/downloads/paper-1.21-$BUILD.jar -O paper.jar

      - name: Generate Configs
        run: |
          java -jar paper.jar --initSettings || true

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: paper-configs
          path: |
            *.yml
            *.properties
            *.json
