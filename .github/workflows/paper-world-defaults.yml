name: Minecraft Attack

on:
  workflow_dispatch:  # Manually trigger

jobs:
  attack:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Attack
        run: |
          python3 attack.py
