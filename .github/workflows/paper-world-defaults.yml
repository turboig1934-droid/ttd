name: Paper World Defaults

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Download Paper from Release
        run: |
          wget -q https://github.com/turboig1934-droid/ttd/releases/download/test/paper-26.1.2-72.1.jar -O paper.jar
          ls -la paper.jar

      - name: Generate Configs
        run: |
          java -jar paper.jar --initSettings || true
          ls -la

      - name: Upload Configs
        uses: actions/upload-artifact@v4
        with:
          name: paper-configs
          path: |
            *.yml
            *.properties
            *.json
          if-no-files-found: warn
