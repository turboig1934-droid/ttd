name: Paper World Defaults

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Download Paper 26.1.2
        run: |
          wget -q https://api.papermc.io/v2/projects/paper/versions/1.21.4/builds/72/downloads/paper-1.21.4-72.jar -O paper.jar
          ls -la paper.jar

      - name: Generate Configs
        run: |
          java -jar paper.jar --initSettings || true
          ls -la

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: paper-configs
          path: |
            *.yml
            *.properties
            *.json
          if-no-files-found: warn
