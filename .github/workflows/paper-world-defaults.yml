name: Paper World Defaults

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Get Build Number
        id: build
        run: |
          BUILD=$(curl -s https://api.papermc.io/v2/projects/paper/versions/1.21 | jq -r '.builds[-1]')
          echo "number=$BUILD" >> $GITHUB_OUTPUT

      - name: Download Paper
        run: |
          BUILD=${{ steps.build.outputs.number }}
          wget https://api.papermc.io/v2/projects/paper/versions/1.21/builds/$BUILD/downloads/paper-1.21-$BUILD.jar

      - name: Generate Configs
        run: |
          java -jar paper-1.21-*.jar --initSettings || true

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: configs
          path: |
            *.yml
            *.properties
            *.json
