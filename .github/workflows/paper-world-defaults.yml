name: Paper World Defaults

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Download Paper Direct
        run: |
          # Latest stable Paper 1.21.4
          wget -q https://api.papermc.io/v2/projects/paper/versions/1.21.4/builds/latest/downloads/paper-1.21.4-latest.jar -O paper.jar || \
          wget -q https://papermc.io/api/v2/projects/paper/versions/1.21.3/builds/latest/downloads/paper-1.21.3-latest.jar -O paper.jar || \
          wget -q https://papermc.io/api/v2/projects/paper/versions/1.21/builds/latest/downloads/paper-1.21-latest.jar -O paper.jar
          ls -la paper.jar

      - name: Generate Configs
        run: |
          java -jar paper.jar --initSettings || true
          ls -la

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: paper-configs
          path: |
            *.yml
            *.properties
            *.json
          if-no-files-found: warn
