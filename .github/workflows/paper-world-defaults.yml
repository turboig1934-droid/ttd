name: Paper World Defaults

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Get Latest Paper Build
        id: paper
        run: |
          VERSION="1.21.4"
          BUILD=$(curl -s https://api.papermc.io/v2/projects/paper/versions/${VERSION} | jq -r '.builds[-1]')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "build=${BUILD}" >> $GITHUB_OUTPUT
          echo "Latest build: ${BUILD}"

      - name: Download Paper
        run: |
          VERSION="${{ steps.paper.outputs.version }}"
          BUILD="${{ steps.paper.outputs.build }}"
          URL="https://api.papermc.io/v2/projects/paper/versions/${VERSION}/builds/${BUILD}/downloads/paper-${VERSION}-${BUILD}.jar"
          echo "Downloading: ${URL}"
          wget -q ${URL} -O paper.jar
          ls -la paper.jar

      - name: Generate Configs
        run: |
          java -jar paper.jar --initSettings || true
          ls -la *.yml *.properties *.json 2>/dev/null || echo "No configs found"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: paper-configs
          path: |
            *.yml
            *.properties
            *.json
          if-no-files-found: warn
